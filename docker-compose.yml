version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: productivity_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: productivity_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: productivity_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/productivity_db
      - SECRET_KEY=super-secret-key-change-in-production-12345
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=AdminPass123!
      - ADMIN_EMAIL=admin@company.com
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: productivity_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
